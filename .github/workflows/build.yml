name: Build Windows Executable
 
on:
   push:
     branches: [ main ]
   pull_request:
     branches: [ main ]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pillow opencv-python numpy pymupdf

    - name: Build executable
      run: pyinstaller VisioDoc3.spec --clean --noconfirm

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: VisioDoc3-windows
        path: dist/VisioDoc3.exe

    - name: Upload release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: exe
        name: Windows Executable
        body: Auto-generated release
        files: dist/VisioDoc3.exe
        fail-on-unmatched-files: false
        delete: true

      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}