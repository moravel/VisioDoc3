openapi: 3.0.3
info:
  title: VisioDoc3 Application Architecture API
  description: |
    OpenAPI 3.0 specification documenting the internal architecture of VisioDoc3,
    a Python desktop application for document viewing and annotation.
    This specification models the application's classes, methods, and data flows
    as REST-like endpoints for documentation purposes.
  version: 3.0.0
  contact:
    name: VisioDoc3 Development Team
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: app://visiodoc3
    description: Local VisioDoc3 Application Instance

tags:
  - name: Application
    description: Core application lifecycle and main window management
  - name: Annotations
    description: Annotation creation, management, and rendering
  - name: VideoStream
    description: Camera capture and video stream handling
  - name: FileOperations
    description: File I/O, document loading, and saving
  - name: UIComponents
    description: User interface components and interactions
  - name: Configuration
    description: Application settings and camera configuration
  - name: StateManagement
    description: Undo/redo stacks and application state

paths:
  /application:
    get:
      tags: [Application]
      summary: Get application instance
      description: Retrieve the main application window and its properties
      operationId: getApplication
      responses:
        '200':
          description: Application instance retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Application'
    post:
      tags: [Application]
      summary: Initialize application
      description: Create and initialize the main application window
      operationId: initializeApplication
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                fullscreen:
                  type: boolean
                  default: true
                  description: Start in fullscreen mode
      responses:
        '201':
          description: Application initialized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Application'

  /application/window:
    put:
      tags: [Application]
      summary: Update window geometry
      operationId: updateWindowGeometry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WindowGeometry'
      responses:
        '200':
          description: Window geometry updated

  /application/closing:
    post:
      tags: [Application]
      summary: Handle application closing
      description: Gracefully shutdown application and cleanup resources
      operationId: onClosing
      responses:
        '200':
          description: Application closed successfully

  /application/fullscreen:
    post:
      tags: [Application]
      summary: Toggle fullscreen mode
      description: Switches application window between normal and fullscreen display modes. Press ESC to exit fullscreen.
      operationId: toggleFullscreen
      responses:
        '200':
          description: Fullscreen mode toggled
          content:
            application/json:
              schema:
                type: object
                properties:
                  isFullscreen:
                    type: boolean
                    description: Current fullscreen state
    delete:
      tags: [Application]
      summary: Exit fullscreen mode
      description: Exits fullscreen mode if currently active (ESC key equivalent)
      operationId: exitFullscreen
      responses:
        '200':
          description: Fullscreen mode exited

  /annotations:
    get:
      tags: [Annotations]
      summary: List all annotations
      description: Retrieve all annotations currently in the document
      operationId: listAnnotations
      parameters:
        - name: layer
          in: query
          schema:
            type: string
          description: Filter by annotation layer
      responses:
        '200':
          description: List of annotations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Annotation'
    post:
      tags: [Annotations]
      summary: Create annotation
      description: Create a new annotation on the current document
      operationId: createAnnotation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnnotationCreate'
      responses:
        '201':
          description: Annotation created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Annotation'

  /annotations/{id}:
    get:
      tags: [Annotations]
      summary: Get annotation by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Annotation details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Annotation'
    put:
      tags: [Annotations]
      summary: Update annotation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnnotationUpdate'
      responses:
        '200':
          description: Annotation updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Annotation'
    delete:
      tags: [Annotations]
      summary: Delete annotation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Annotation deleted

  /annotations/{id}/move:
    post:
      tags: [Annotations]
      summary: Move annotation
      description: Move an annotation by delta coordinates
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                dx:
                  type: integer
                  description: Delta X coordinate
                dy:
                  type: integer
                  description: Delta Y coordinate
      responses:
        '200':
          description: Annotation moved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Annotation'

  /annotations/{id}/resize:
    post:
      tags: [Annotations]
      summary: Resize annotation
      description: Resize an annotation using a handle
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResizeOperation'
      responses:
        '200':
          description: Annotation resized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Annotation'

  /annotations/{id}/is-point-inside:
    post:
      tags: [Annotations]
      summary: Check if point is inside annotation
      description: Test if a point is within the annotation's interactive area
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                point:
                  $ref: '#/components/schemas/Point2D'
      responses:
        '200':
          description: Point test result
          content:
            application/json:
              schema:
                type: object
                properties:
                  inside:
                    type: boolean

  /annotations/bounding-box/{id}:
    get:
      tags: [Annotations]
      summary: Get annotation bounding box
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Bounding box
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BoundingBox'

  /annotations/clear:
    delete:
      tags: [Annotations]
      summary: Clear all annotations
      description: Remove all annotations from the current document
      operationId: clearAllAnnotations
      responses:
        '204':
          description: All annotations cleared

  /annotations/undo:
    post:
      tags: [Annotations]
      summary: Undo last annotation
      description: Move last annotation to redo stack
      operationId: undoLastAnnotation
      responses:
        '200':
          description: Annotation undone
          content:
            application/json:
              schema:
                type: object
                properties:
                  undone:
                    $ref: '#/components/schemas/Annotation'
                  remaining:
                    type: integer
                    description: Number of remaining annotations

  /annotations/redo:
    post:
      tags: [Annotations]
      summary: Redo last undone annotation
      description: Restore last undone annotation
      operationId: redoLastAnnotation
      responses:
        '200':
          description: Annotation redone
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Annotation'

  /annotations/types:
    get:
      tags: [Annotations]
      summary: Get available annotation types
      description: List all supported annotation types
      operationId: getAnnotationTypes
      responses:
        '200':
          description: List of annotation types
          content:
            application/json:
              schema:
                type: object
                properties:
                  types:
                    type: array
                    items:
                      $ref: '#/components/schemas/AnnotationTypeInfo'

  /videostream:
    get:
      tags: [VideoStream]
      summary: Get video stream status
      description: Check if video stream is active and get current frame
      operationId: getVideoStreamStatus
      responses:
        '200':
          description: Video stream status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VideoStreamStatus'
    post:
      tags: [VideoStream]
      summary: Start video stream
      description: Initialize and start video capture from camera
      operationId: startVideoStream
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VideoStreamConfig'
      responses:
        '201':
          description: Video stream started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VideoStreamStatus'

  /videostream/stop:
    post:
      tags: [VideoStream]
      summary: Stop video stream
      description: Stop the current video stream
      operationId: stopVideoStream
      responses:
        '200':
          description: Video stream stopped

  /videostream/frame:
    get:
      tags: [VideoStream]
      summary: Get current frame
      description: Retrieve the latest frame from the video stream
      operationId: getCurrentFrame
      responses:
        '200':
          description: Current video frame
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VideoFrame'

  /videostream/flip/horizontal:
    post:
      tags: [VideoStream]
      summary: Flip video horizontally
      description: Toggle horizontal flip of video stream
      operationId: flipHorizontal
      responses:
        '200':
          description: Horizontal flip toggled
          content:
            application/json:
              schema:
                type: object
                properties:
                  flipped:
                    type: boolean

  /videostream/flip/vertical:
    post:
      tags: [VideoStream]
      summary: Flip video vertically
      description: Toggle vertical flip of video stream
      operationId: flipVertical
      responses:
        '200':
          description: Vertical flip toggled
          content:
            application/json:
              schema:
                type: object
                properties:
                  flipped:
                    type: boolean

  /videostream/cameras:
    get:
      tags: [VideoStream]
      summary: List available cameras
      description: Enumerate all available camera devices
      operationId: listCameras
      responses:
        '200':
          description: List of available cameras
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CameraInfo'

  /videostream/cameras/scan:
    post:
      tags: [VideoStream]
      summary: Scan for cameras
      description: Scan system for available camera devices
      operationId: scanCameras
      responses:
        '200':
          description: Camera scan complete
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CameraInfo'

  /file:
    post:
      tags: [FileOperations]
      summary: Open file
      description: Open an image or PDF file for viewing and annotation
      operationId: openFile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FileOpenRequest'
      responses:
        '200':
          description: File opened successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileStatus'
        '400':
          description: Invalid file type or error opening file

  /file/close:
    post:
      tags: [FileOperations]
      summary: Close file
      description: Close current file and return to webcam mode
      operationId: closeFile
      responses:
        '200':
          description: File closed, returned to webcam mode
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileStatus'

  /file/save:
    post:
      tags: [FileOperations]
      summary: Save annotated image
      description: Save current annotated display as image or PDF
      operationId: saveImage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SaveRequest'
      responses:
        '200':
          description: File saved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SaveResult'

  /file/pdf/page:
    get:
      tags: [FileOperations]
      summary: Get current PDF page
      description: Get the currently displayed PDF page number
      operationId: getCurrentPdfPage
      responses:
        '200':
          description: Current PDF page info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PdfPageInfo'

  /file/pdf/page/{number}:
    get:
      tags: [FileOperations]
      summary: Navigate to PDF page
      description: Load a specific page from the PDF document
      parameters:
        - name: number
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Page loaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PdfPageInfo'

  /file/pdf/next:
    post:
      tags: [FileOperations]
      summary: Next PDF page
      description: Navigate to next page of PDF document
      operationId: nextPdfPage
      responses:
        '200':
          description: Next page loaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PdfPageInfo'

  /file/pdf/prev:
    post:
      tags: [FileOperations]
      summary: Previous PDF page
      description: Navigate to previous page of PDF document
      operationId: prevPdfPage
      responses:
        '200':
          description: Previous page loaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PdfPageInfo'

  /ui/tool:
    put:
      tags: [UIComponents]
      summary: Set active tool
      description: Change the currently active drawing/annotation tool
      operationId: setTool
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ToolSelection'
      responses:
        '200':
          description: Tool changed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolStatus'

  /ui/tool/color:
    put:
      tags: [UIComponents]
      summary: Set annotation color
      description: Change the current annotation color
      operationId: setAnnotationColor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ColorRGB'
      responses:
        '200':
          description: Color updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ColorRGB'

  /ui/tool/size:
    put:
      tags: [UIComponents]
      summary: Set annotation size
      description: Change annotation thickness and font size
      operationId: setAnnotationSize
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnnotationSize'
      responses:
        '200':
          description: Size settings updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnnotationSize'

  /ui/display:
    get:
      tags: [UIComponents]
      summary: Get display status
      description: Get current display configuration and status
      operationId: getDisplayStatus
      responses:
        '200':
          description: Display status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DisplayStatus'

  /ui/display/zoom:
    post:
      tags: [UIComponents]
      summary: Apply zoom
      description: Zoom in/out of the current display
      operationId: applyZoom
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                factor:
                  type: number
                  description: Zoom factor (>1 to zoom in, <1 to zoom out)
                x:
                  type: integer
                  description: X coordinate of zoom center
                y:
                  type: integer
                  description: Y coordinate of zoom center
      responses:
        '200':
          description: Zoom applied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ZoomState'

  /ui/display/zoom/in:
    post:
      tags: [UIComponents]
      summary: Zoom in
      description: Increase zoom level
      operationId: zoomIn
      responses:
        '200':
          description: Zoom level increased
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ZoomState'

  /ui/display/zoom/out:
    post:
      tags: [UIComponents]
      summary: Zoom out
      description: Decrease zoom level
      operationId: zoomOut
      responses:
        '200':
          description: Zoom level decreased
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ZoomState'

  /ui/display/reset:
    post:
      tags: [UIComponents]
      summary: Reset display
      description: Reset zoom and pan to defaults
      operationId: resetDisplay
      responses:
        '200':
          description: Display reset
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ZoomState'

  /ui/display/pan:
    post:
      tags: [UIComponents]
      summary: Pan display
      description: Adjust the pan offset of the display
      operationId: panDisplay
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                dx:
                  type: integer
                  description: Delta X for pan
                dy:
                  type: integer
                  description: Delta Y for pan
      responses:
        '200':
          description: Display panned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PanState'

  /ui/mouse/click:
    post:
      tags: [UIComponents]
      summary: Handle mouse click
      description: Process mouse click event on display area
      operationId: onMouseClick
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MouseEvent'
      responses:
        '200':
          description: Click processed
          content:
            application/json:
              schema:
                type: object
                properties:
                  annotation:
                    $ref: '#/components/schemas/Annotation'
                  action:
                    type: string
                    enum: [select, deselect, create, move]

  /ui/mouse/drag:
    post:
      tags: [UIComponents]
      summary: Handle mouse drag
      description: Process mouse drag event for drawing or moving
      operationId: onMouseDrag
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MouseDragEvent'
      responses:
        '200':
          description: Drag processed

  /ui/mouse/release:
    post:
      tags: [UIComponents]
      summary: Handle mouse release
      description: Process mouse button release event
      operationId: onMouseRelease
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MouseEvent'
      responses:
        '200':
          description: Release processed
          content:
            application/json:
              schema:
                type: object
                properties:
                  annotation:
                    $ref: '#/components/schemas/Annotation'
                  action:
                    type: string

  /ui/mouse/move:
    post:
      tags: [UIComponents]
      summary: Handle mouse move
      description: Process mouse movement for hover detection
      operationId: onMouseMove
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MouseEvent'
      responses:
        '200':
          description: Movement processed
          content:
            application/json:
              schema:
                type: object
                properties:
                  hovered_annotation:
                    $ref: '#/components/schemas/Annotation'

  /config:
    get:
      tags: [Configuration]
      summary: Get configuration
      description: Retrieve current application configuration
      operationId: getConfig
      responses:
        '200':
          description: Configuration retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppConfig'

  /config/camera:
    get:
      tags: [Configuration]
      summary: Get camera configuration
      description: Retrieve camera settings from config file
      operationId: getCameraConfig
      responses:
        '200':
          description: Camera config retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CameraConfig'

  /config/camera/save:
    post:
      tags: [Configuration]
      summary: Save camera configuration
      description: Save camera settings to config file
      operationId: saveCameraConfig
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CameraConfig'
      responses:
        '200':
          description: Camera config saved

  /config/brightness:
    put:
      tags: [Configuration]
      summary: Set brightness
      description: Adjust camera brightness setting
      operationId: setBrightness
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                value:
                  type: number
                  minimum: 0
                  maximum: 255
                  description: Brightness value (0-255)
      responses:
        '200':
          description: Brightness updated

  /config/contrast:
    put:
      tags: [Configuration]
      summary: Set contrast
      description: Adjust camera contrast setting
      operationId: setContrast
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                value:
                  type: number
                  minimum: 0
                  maximum: 255
                  description: Contrast value (0-255)
      responses:
        '200':
          description: Contrast updated

  /config/resolution:
    put:
      tags: [Configuration]
      summary: Set resolution
      description: Change camera resolution
      operationId: setResolution
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Resolution'
      responses:
        '200':
          description: Resolution updated

  /state:
    get:
      tags: [StateManagement]
      summary: Get application state
      description: Retrieve current application state information
      operationId: getState
      responses:
        '200':
          description: Application state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationState'

  /state/history:
    get:
      tags: [StateManagement]
      summary: Get history stacks
      description: Retrieve undo and redo stack information
      operationId: getHistory
      responses:
        '200':
          description: History stacks
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HistoryStacks'

components:
  schemas:
    Application:
      type: object
      properties:
        id:
          type: string
          description: Application instance ID
        title:
          type: string
          description: Window title
        version:
          type: string
          description: Application version
        state:
          $ref: '#/components/schemas/ApplicationState'
        window:
          $ref: '#/components/schemas/WindowGeometry'
        display:
          $ref: '#/components/schemas/DisplayStatus'

    ApplicationState:
      type: object
      properties:
        mode:
          type: string
          enum: [webcam, file, idle]
          description: Current application mode
        current_tool:
          type: string
          description: Currently selected tool
        zoom_level:
          type: number
          description: Current zoom level
        file_mode:
          type: boolean
          description: Whether in file viewing mode
        has_document:
          type: boolean
          description: Whether a document is loaded

    WindowGeometry:
      type: object
      properties:
        width:
          type: integer
          description: Window width in pixels
        height:
          type: integer
          description: Window height in pixels
        x:
          type: integer
          description: Window X position
        y:
          type: integer
          description: Window Y position
        fullscreen:
          type: boolean
          description: Whether window is fullscreen

    Annotation:
      type: object
      required:
        - type
        - color
      properties:
        id:
          type: integer
          description: Unique annotation ID
        type:
          type: string
          enum: [line, rectangle, circle, freedraw, text, blur, arrow, highlight]
          description: Annotation type
        color:
          $ref: '#/components/schemas/ColorBGR'
        thickness:
          type: integer
          description: Line thickness
        created_at:
          type: string
          format: date-time
          description: Creation timestamp
        properties:
          type: object
          description: Type-specific properties
          oneOf:
            - $ref: '#/components/schemas/LineProperties'
            - $ref: '#/components/schemas/RectangleProperties'
            - $ref: '#/components/schemas/CircleProperties'
            - $ref: '#/components/schemas/FreeDrawProperties'
            - $ref: '#/components/schemas/TextProperties'
            - $ref: '#/components/schemas/BlurProperties'
            - $ref: '#/components/schemas/ArrowProperties'
            - $ref: '#/components/schemas/HighlightProperties'

    AnnotationCreate:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum: [line, rectangle, circle, freedraw, text, blur, arrow, highlight]
        color:
          $ref: '#/components/schemas/ColorBGR'
        thickness:
          type: integer
          default: 2
