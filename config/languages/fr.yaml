help:
  title: "Manuel d'Utilisateur VisioDoc3"
  loading: "Chargement de la caméra..."
  close: "Fermer"
  manual: |
    # Guide VisioDoc3

    **Interface:**
    - Barre latérale gauche: Outils d'annotation
    - Centre: Affichage vidéo de la webcam
    - Barre d'outils: Menus Fichier, Annotations, Affichage, Langue
    - Barre latérale droite: Actions (sauvegarder, effacer, annuler)

    **Raccourcis:**
    - Utilisez les outils de la barre latérale
    - Zoom avec Ctrl+Molette ou Ctrl+/-
    - Panoramique avec le bouton milieu de la souris
    - Sauvegardez en PNG ou PDF

