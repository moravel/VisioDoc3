help:
  title: "VisioDoc3 User Manual"
  loading: "Loading camera..."
  close: "Close"
  manual: |
    # VisioDoc3 User Guide

    **Interface Overview:**
    - Left sidebar: Annotation tools (draw, text, shapes)
    - Center: Video display from webcam
    - Top toolbar: File, Annotations, View, Language menus
    - Right sidebar: Actions (save, clear, undo/redo)

    **Quick Tips:**
    - Use tools from sidebar to annotate
    - Zoom with Ctrl+Wheel or Ctrl+/-
    - Pan with middle mouse button when zoomed
    - Save annotated images as PNG or PDF

