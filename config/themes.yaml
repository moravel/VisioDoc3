# VisioDoc3 Theme Definitions
# Modern dark/light themes with proper contrast and accessibility

themes:
  dark:
    name: "Modern Dark"
    description: "Modern dark theme with high contrast for accessibility"
    
    # Primary colors
    primary: "#3b82f6"        # Blue 500 - main accent
    primary_hover: "#2563eb"  # Blue 600 - accent hover
    primary_active: "#1d4ed8" # Blue 700 - accent active
    
    # Background colors
    background: "#111827"     # Gray 900 - main background
    surface: "#1f2937"        # Gray 800 - panels/cards
    surface_hover: "#374151"  # Gray 700 - hover state
    
    # Text colors
    text_primary: "#f9fafb"    # Gray 50 - primary text
    text_secondary: "#d1d5db"  # Gray 300 - secondary text
    text_disabled: "#6b7280"   # Gray 500 - disabled text
    
    # Border colors
    border: "#374151"         # Gray 700 - borders
    border_focus: "#60a5fa"     # Blue 400 - focused borders
    
    # Status colors
    success: "#10b981"         # Emerald 500
    warning: "#f59e0b"         # Amber 500
    error: "#ef4444"           # Red 500
    info: "#06b6d4"            # Cyan 500
    
    # Button specific
    button_background: "#374151"
    button_foreground: "#f9fafb"
    button_border: "#4b5563"
    button_hover: "#4b5563"
    button_pressed: "#6b7280"
    
    # Panel colors
    panel_background: "#111827"
    panel_border: "#374151"
    
    # Video overlay
    overlay: "#00000080"      # Semi-transparent black

  light:
    name: "Modern Light"
    description: "Clean light theme with soft colors"
    
    # Primary colors
    primary: "#2563eb"        # Blue 600 - main accent
    primary_hover: "#1d4ed8"  # Blue 700 - accent hover
    primary_active: "#1e40af" # Blue 800 - accent active
    
    # Background colors
    background: "#ffffff"      # White - main background
    surface: "#f9fafb"         # Gray 50 - panels/cards
    surface_hover: "#f3f4f6"   # Gray 100 - hover state
    
    # Text colors
    text_primary: "#111827"    # Gray 900 - primary text
    text_secondary: "#374151"  # Gray 700 - secondary text
    text_disabled: "#9ca3af"   # Gray 400 - disabled text
    
    # Border colors
    border: "#d1d5db"         # Gray 300 - borders
    border_focus: "#3b82f6"    # Blue 500 - focused borders
    
    # Status colors
    success: "#059669"         # Emerald 600
    warning: "#d97706"         # Amber 600
    error: "#dc2626"           # Red 600
    info: "#0891b2"            # Cyan 600
    
    # Button specific
    button_background: "#ffffff"
    button_foreground: "#111827"
    button_border: "#d1d5db"
    button_hover: "#f3f4f6"
    button_pressed: "#e5e7eb"
    
    # Panel colors
    panel_background: "#ffffff"
    panel_border: "#e5e7eb"
    
    # Video overlay
    overlay: "#00000040"      # Semi-transparent black

defaults:
  theme: "dark"              # Default to dark theme
  animation_speed: 200       # ms for animations
  font_family: "Segoe UI"    # Default font
  font_size: 10              # Default font size